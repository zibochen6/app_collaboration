services:
  got_oss_20b:
    image: chenduola6/got-oss-20b:jp6
    container_name: got_oss_20b
    restart: unless-stopped
    runtime: nvidia
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - LLAMA_PORT=8080
      - LLAMA_NGL=${LLAMA_NGL:-20}
      - LLAMA_CTX=${LLAMA_CTX:-1024}
    command:
      - bash
      - -lc
      - |
        set -e
        cd /root/gpt-oss/llama.cpp
        exec ./build/bin/llama-server \
          -m /root/gpt-oss/gguf/gpt-oss-20b-Q4_K.gguf \
          -ngl "${LLAMA_NGL:-20}" -c "${LLAMA_CTX:-1024}" \
          --host 0.0.0.0 --port "${LLAMA_PORT:-8080}"
